<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPing Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --accent: #38bdf8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h1 { margin: 0; color: var(--accent); }
        .refresh-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: var(--accent); color: var(--bg); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--text-dim);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-2px); }
        .card.up { border-left-color: var(--success); }
        .card.down { border-left-color: var(--error); }
        .url { font-weight: bold; word-break: break-all; margin-bottom: 0.5rem; display: block; }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge.up { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge.down { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        .latency { font-size: 0.9rem; color: var(--text-dim); }
        .timestamp { font-size: 0.75rem; color: var(--text-dim); margin-top: 1rem; display: block; }
        .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 0.5rem; }
        #loader { margin: 2rem; font-style: italic; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 HealthPing</h1>
            <button class="refresh-btn" onclick="fetchStatus()">Refresh Now</button>
        </header>

        <div id="loader">Fetching latest status...</div>
        <div id="grid" class="grid"></div>
        
        <p id="last-updated" class="timestamp"></p>
    </div>

    <script>
        async function fetchStatus() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('grid');
            const lastUpdated = document.getElementById('last-updated');
            
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = '';
                
                data.monitored_urls.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `card ${item.success ? 'up' : 'down'}`;
                    
                    card.innerHTML = `
                        <span class="url">${item.url}</span>
                        <div class="status-row">
                            <span class="badge ${item.success ? 'up' : 'down'}">
                                ${item.success ? 'UP' : 'DOWN'}
                            </span>
                            <span class="latency">${item.responseTime}ms</span>
                        </div>
                        ${!item.success ? `<div class="error-msg">${item.error}</div>` : ''}
                        <span class="timestamp">Last Checked: ${new Date(item.timestamp).toLocaleTimeString()}</span>
                    `;
                    grid.appendChild(card);
                });
                
                lastUpdated.innerText = `System Time: ${new Date(data.timestamp).toLocaleString()}`;
            } catch (err) {
                loader.innerText = 'Failed to load status. Is the server running?';
                console.error(err);
            }
        }

        // Auto-refresh every 30 seconds
        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
</body>
</html>
