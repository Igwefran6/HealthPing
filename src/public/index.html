<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPing Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --accent: #38bdf8;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h1 { margin: 0; color: var(--accent); font-size: 1.5rem; }
        .refresh-btn {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .refresh-btn:hover { background: var(--accent); color: var(--bg); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-top: 4px solid var(--text-dim);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-2px); }
        .card.up { border-top-color: var(--success); }
        .card.down { border-top-color: var(--error); }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .url { font-weight: bold; word-break: break-all; font-size: 1rem; flex: 1; padding-right: 10px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.1rem; font-weight: 600; }
        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.error { color: var(--error); }

        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge.up { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge.down { background: rgba(239, 68, 68, 0.2); color: var(--error); }
        
        .footer-info {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }
        .timestamp { font-size: 0.7rem; color: var(--text-dim); }
        .latency-current { font-size: 0.8rem; font-weight: 500; }

        .error-msg { 
            color: var(--error); 
            font-size: 0.75rem; 
            margin-top: 0.5rem; 
            padding: 0.5rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 4px;
        }
        #loader { margin: 2rem; font-style: italic; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 HealthPing <span style="font-weight: normal; font-size: 0.8rem; color: var(--text-dim); margin-left: 10px;">Production Monitor</span></h1>
            <button class="refresh-btn" onclick="fetchStatus()">Refresh Status</button>
        </header>

        <div id="loader">Fetching latest service metrics...</div>
        <div id="grid" class="grid"></div>
        
        <p id="system-info" class="timestamp" style="text-align: center; margin-top: 3rem;"></p>
    </div>

    <script>
        function getUptimeColor(uptimeStr) {
            const uptime = parseFloat(uptimeStr);
            if (uptime >= 99.9) return 'success';
            if (uptime >= 95) return 'warning';
            return 'error';
        }

        async function fetchStatus() {
            const loader = document.getElementById('loader');
            const grid = document.getElementById('grid');
            const systemInfo = document.getElementById('system-info');
            
            try {
                const res = await fetch('/status');
                const data = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = '';
                
                data.monitored_urls.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `card ${item.success ? 'up' : 'down'}`;
                    
                    const uptimeColor = getUptimeColor(item.uptime_24h);
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="url">${item.url}</span>
                            <span class="badge ${item.success ? 'up' : 'down'}">
                                ${item.success ? 'ONLINE' : 'OFFLINE'}
                            </span>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-item">
                                <span class="stat-label">Uptime (24h)</span>
                                <span class="stat-value ${uptimeColor}">${item.uptime_24h}</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">Avg Latency</span>
                                <span class="stat-value">${item.avg_latency_24h}</span>
                            </div>
                        </div>

                        ${!item.success ? `<div class="error-msg">Error: ${item.error}</div>` : ''}
                        
                        <div class="footer-info">
                            <span class="timestamp">Checked ${new Date(item.timestamp).toLocaleTimeString()}</span>
                            <span class="latency-current">${item.responseTime}ms</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                systemInfo.innerText = `Last System Update: ${new Date(data.timestamp).toLocaleString()}`;
            } catch (err) {
                loader.innerText = 'Unable to connect to HealthPing API. Please check server status.';
                console.error(err);
            }
        }

        // Auto-refresh every 60 seconds
        fetchStatus();
        setInterval(fetchStatus, 60000);
    </script>
</body>
</html>
