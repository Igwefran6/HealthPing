<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPing Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --border: #334155;
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            
            --brand: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        @media (max-width: 640px) {
            .wrapper { padding: 1rem; }
        }

        /* Header Section */
        header {
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--brand), #0ea5e9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.025em; }

        /* Global Status Card */
        .global-status {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: var(--shadow);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .pulse {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 2s infinite;
        }
        
        .pulse.error { background-color: var(--danger); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-text h2 { margin: 0; font-size: 1.125rem; }
        .status-text p { margin: 0; color: var(--text-secondary); font-size: 0.875rem; }

        .metrics {
            display: flex;
            gap: 2rem;
        }

        .metric { text-align: right; }
        .metric-value { display: block; font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
        .metric-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        /* Service Card */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--text-secondary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .service-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
            display: block;
        }

        .service-url {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
        
        .badge.up { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge.down { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .stat-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        
        .stat-group span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Uptime Bar */
        .uptime-container {
            margin-top: 1rem;
        }
        
        .uptime-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-surface-hover);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease-in-out;
        }

        /* Footer */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 1rem;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Loader */
        #loader { text-align: center; padding: 4rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="brand">
                <div class="brand-icon">HP</div>
                <h1>HealthPing</h1>
            </div>

            <div class="global-status" id="global-status">
                <div class="status-indicator">
                    <div class="pulse" id="global-pulse"></div>
                    <div class="status-text">
                        <h2 id="global-text">Loading System Status...</h2>
                        <p id="global-subtext">Connecting to telemetry...</p>
                    </div>
                </div>
                <div class="metrics">
                    <div class="metric">
                        <span class="metric-value" id="total-monitors">-</span>
                        <span class="metric-label">Monitors</span>
                    </div>
                    <div class="metric">
                        <span class="metric-value" id="global-latency">-</span>
                        <span class="metric-label">Avg Latency</span>
                    </div>
                </div>
            </div>
        </header>

        <div id="loader">Initializing Dashboard...</div>
        <div class="grid" id="grid"></div>
    </div>

    <script>
        function timeAgo(dateString) {
            if (!dateString) return 'None';
            // SQLite timestamp is in 'YYYY-MM-DD HH:MM:SS' format (UTC)
            // Replace space with T to make it ISO-like
            const date = new Date(dateString.replace(' ', 'T') + 'Z');
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            return date.toLocaleDateString();
        }

        function formatUptime(uptimeStr) {
            return parseFloat(uptimeStr).toFixed(2);
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function safeHostname(url) {
            try {
                return new URL(url).hostname;
            } catch {
                return url;
            }
        }

        function getColor(uptime) {
            if (uptime >= 99.9) return 'var(--success)';
            if (uptime >= 98.0) return 'var(--warning)';
            return 'var(--danger)';
        }

        function updateGlobalStatus(monitors) {
            const downCount = monitors.filter(m => !m.success).length;
            const total = monitors.length;
            const totalLatency = monitors.reduce((acc, m) => acc + (parseInt(m.avg_latency_24h) || 0), 0);
            const avgLatency = Math.round(totalLatency / (total || 1));

            const globalText = document.getElementById('global-text');
            const globalSubtext = document.getElementById('global-subtext');
            const globalPulse = document.getElementById('global-pulse');
            
            document.getElementById('total-monitors').innerText = total;
            document.getElementById('global-latency').innerText = avgLatency + 'ms';

            if (downCount === 0) {
                globalText.innerText = 'All Systems Operational';
                globalSubtext.innerText = 'Everything is running smoothly.';
                globalText.style.color = 'var(--success)';
                globalPulse.classList.remove('error');
            } else {
                globalText.innerText = `${downCount} Service(s) Down`;
                globalSubtext.innerText = 'Some systems are experiencing issues.';
                globalText.style.color = 'var(--danger)';
                globalPulse.classList.add('error');
            }
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/status');
                if (!res.ok) {
                    throw new Error(`Status API returned ${res.status}`);
                }
                const data = await res.json();
                
                document.getElementById('loader').style.display = 'none';
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                updateGlobalStatus(data.monitored_urls);

                data.monitored_urls.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const uptimeVal = parseFloat(item.uptime_24h);
                    const color = getColor(uptimeVal);

                    card.innerHTML = `
                        <div class="card-header">
                            <div>
                                <span class="service-name">${escapeHtml(safeHostname(item.url))}</span>
                                <span class="service-url">${escapeHtml(item.url)}</span>
                            </div>
                            <span class="badge ${item.success ? 'up' : 'down'}">
                                ${item.success ? 'OPERATIONAL' : 'OUTAGE'}
                            </span>
                        </div>

                        <div class="stats-row">
                            <div class="stat-group">
                                <label>Response Time</label>
                                <span style="color: ${item.responseTime > 500 ? 'var(--warning)' : 'var(--text-primary)'}">
                                    ${escapeHtml(item.responseTime)}ms
                                </span>
                            </div>
                            <div class="stat-group" style="text-align: right;">
                                <label>Last Failure</label>
                                <span style="color: ${item.last_failure_at ? 'var(--danger)' : 'var(--success)'}; font-size: 0.9rem;">
                                    ${timeAgo(item.last_failure_at)}
                                </span>
                            </div>
                        </div>

                        ${!item.success ? `
                            <div class="error-banner">
                                <span>⚠️</span> ${escapeHtml(item.error)}
                            </div>
                        ` : ''}

                        <div class="uptime-container">
                            <div class="uptime-header">
                                <span>24h Uptime</span>
                                <span style="color: ${color}; font-weight: bold;">${item.uptime_24h}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${item.uptime_24h}; background-color: ${color};"></div>
                            </div>
                        </div>

                        <div class="card-footer">
                            <span>Checked ${new Date(item.timestamp).toLocaleTimeString()}</span>
                            <span>ID: ${escapeHtml(item.id || 'N/A')}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                const loader = document.getElementById('loader');
                loader.textContent = `Unable to load status: ${err.message}`;
                loader.style.color = 'var(--danger)';
            }
        }

        fetchStatus();
        setInterval(fetchStatus, 10000); // Faster refresh (10s)
    </script>
</body>
</html>
